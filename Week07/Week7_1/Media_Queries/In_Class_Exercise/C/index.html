<!doctype html>

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive 101</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />







    <script type="text/javascript">

      document.addEventListener('DOMContentLoaded', function(){
         var hamburger = document.getElementById('mobile-menu')
         hamburger.addEventListener('click',toggleShow)
      })

      function toggleShow(){
        var menu = document.getElementById('menu') 
        menu.classList.toggle('show');
      }

/*

*/
    </script>

    <header>
      <h1 class="brand"><a href="#">Logo</a></h1>
      <!-- Hide this till we hit smaller screens! -->
       <!-- Click to toggle class .show on ul.menu item -->
      <span class="mobile-menu" id="mobile-menu">&#8801;</span>
      <nav>
        <!-- recieves/loses the .show class on hamburger click -->
        <ul class="menu" id="menu">
          <li><a href="#">Link 1</a></li>
